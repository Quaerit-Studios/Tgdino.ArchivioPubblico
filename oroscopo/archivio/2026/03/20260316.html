        /**
         * Motore Audio Retro (Web Audio API)
         */
        class RetroAudio {
            constructor() {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                this.isPlayingBGM = false;
                this.bgmTimeout = null;
            }

            playGlitchSound() {
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const now = this.ctx.currentTime;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'square';
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.frequency.setValueAtTime(440, now);
                osc.frequency.exponentialRampToValueAtTime(1760, now + 0.1);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now); osc.stop(now + 0.5);
                const bufferSize = this.ctx.sampleRate * 0.5;
                const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = this.ctx.createBufferSource();
                noise.buffer = buffer;
                const noiseGain = this.ctx.createGain();
                noiseGain.gain.setValueAtTime(0.08, now);
                noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
                noise.connect(noiseGain);
                noiseGain.connect(this.ctx.destination);
                noise.start(now);
            }

            playMenuBlip() {
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                const now = this.ctx.currentTime;
                osc.frequency.setValueAtTime(880, now);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            }

            startBGM() {
                if (this.isPlayingBGM) return;
                this.isPlayingBGM = true;
                if (this.ctx.state === 'suspended') this.ctx.resume();
                const notes = {
                    C2: 65.41, Eb2: 77.78, F2: 87.31, G2: 98.00, Bb2: 116.54,

        /**
         * Sistema Particellare (CRT Dust)

        class ParticleSystem {
            constructor(width, height) {
                this.width = width; this.height = height; this.particles = [];
                const numParticles = Math.floor((width * height) / 15000);
                for (let i = 0; i < numParticles; i++) {
                    this.particles.push({
                        x: Math.random() * width, y: Math.random() * height,
                        vx: (Math.random() - 0.5) * 0.2, vy: (Math.random() - 0.5) * 0.2,
                        size: Math.random() * 1.5 + 0.5, alpha: Math.random() * 0.5 + 0.1

                }
            }
            resize(w, h) { this.width = w; this.height = h; }
            update() {
                this.particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    p.vx += (Math.random() - 0.5) * 0.02; p.vy += (Math.random() - 0.5) * 0.02;
                    p.vx = Math.max(-0.5, Math.min(0.5, p.vx)); p.vy = Math.max(-0.5, Math.min(0.5, p.vy));
                    if (p.x < 0) p.x = this.width; if (p.x > this.width) p.x = 0;
                    if (p.y < 0) p.y = this.height; if (p.y > this.height) p.y = 0;
                });
            }
            draw(ctx) {
                ctx.save();

                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                });
                ctx.restore();
            }
        }

                }

                ctx.textAlign = 'center'; ctx.font = `20px 'VT323', monospace`; ctx.fillStyle = COLORS.terminalGreen;
                ctx.fillText(isMobile ? "[TAP] PER SELEZIONARE" : "[↑↓←→] MUOVI    [ENTER] SELEZIONA    [MOUSE] PUNTA E CLICCA", w / 2, h - 25); ctx.restore();
            }
            getWrapTextLines(context, text, maxWidth) {
                let words = text.split(' '); let lines = []; let currentLine = words[0];
                for (let i = 1; i < words.length; i++) {
                    let width = context.measureText(currentLine + " " + words[i]).width;
                    if (width < maxWidth) currentLine += " " + words[i]; else { lines.push(currentLine); currentLine = words[i]; }
                }
                lines.push(currentLine); return lines;
            }

            drawDetailView(ctx, w, h) {
                const area = this.mainArea; const data = OROSCOPO_DATA[this.selectedIndex]; const themeName = data.sign;
                const currentTheme = CONSOLE_THEMES[themeName]; const progress = this.textAnim.progress;
                const isPortrait = area.h > area.w;
                ctx.save();
                ctx.fillStyle = this.isBackHovered ? '#114411' : 'rgba(0,0,0,0.8)'; ctx.fillRect(this.backBtn.x, this.backBtn.y, this.backBtn.w, this.backBtn.h);
                ctx.strokeStyle = COLORS.terminalGreen; ctx.lineWidth = 1; ctx.strokeRect(this.backBtn.x, this.backBtn.y, this.backBtn.w, this.backBtn.h);
                ctx.fillStyle = COLORS.terminalGreen; ctx.font = `24px 'VT323', monospace`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText("◄ BACK", this.backBtn.x + this.backBtn.w / 2, this.backBtn.y + this.backBtn.h / 2);
                ctx.save();
                ctx.beginPath(); ctx.rect(area.x, area.y, area.w, area.h); ctx.clip();
                currentTheme.drawBg(ctx, area, performance.now());
                ctx.restore();
                ctx.save();
                const headerY = area.y + Math.max(10, h * 0.02);
                const titleFontSize = isPortrait ? Math.min(50, area.w * 0.12) : Math.min(65, area.w * 0.12);
                ctx.textAlign = 'center'; ctx.textBaseline = 'top'; ctx.font = `${titleFontSize}px 'VT323', monospace`;
                const titleText = `[ ${themeName.toUpperCase()} ]`;
                ctx.lineWidth = 5; ctx.strokeStyle = '#000000'; ctx.strokeText(titleText, area.x + area.w / 2, headerY);
                ctx.fillStyle = '#ffffff';
                if (currentTheme.titleShadow) { ctx.shadowColor = currentTheme.titleShadow; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3; ctx.shadowBlur = 5; }
                else { ctx.shadowColor = '#000000'; ctx.shadowOffsetX = 3; ctx.shadowOffsetY = 3; ctx.shadowBlur = 5; }
                ctx.fillText(titleText, area.x + area.w / 2, headerY);
                ctx.restore();
                const headerBottom = headerY + titleFontSize + (isPortrait ? 15 : 25);
                const panelX = area.x + (isPortrait ? 10 : 20);
                const panelY = headerBottom;
                const panelW = area.w - (isPortrait ? 20 : 40);
                const panelH = (area.y + area.h) - headerBottom - (isPortrait ? 15 : 25);
                const cx = panelX + panelW / 2;
                const cy = panelY + panelH / 2;
                ctx.save();
                if (progress < 1) {
                    switch (themeName) {
                        case 'Ariete': let steps = 8; let p = Math.floor(progress * steps) / steps; ctx.beginPath(); ctx.rect(panelX, panelY, panelW, panelH * p); ctx.clip(); break;
                        case 'Toro': ctx.translate(0, (1 - progress) * -800 + Math.abs(Math.sin(progress * Math.PI * 3)) * (1 - progress) * 80); ctx.globalAlpha = progress; break;
                        case 'Gemelli': ctx.translate(cx, cy); ctx.scale(1, progress); ctx.translate(-cx, -cy); break;
                        case 'Cancro': ctx.translate(cx, cy); ctx.scale(progress, progress * progress); ctx.translate(-cx, -cy); ctx.globalAlpha = progress; break;
                        case 'Leone': ctx.translate((1 - Math.pow(progress, 4)) * w, 0); break;
                        case 'Vergine': ctx.globalAlpha = progress; if (Math.random() > progress) ctx.translate((Math.random() - 0.5) * 60, 0); break;
                        case 'Bilancia': ctx.translate(cx, cy); ctx.rotate((1 - progress) * Math.PI * 2); ctx.scale(progress, progress); ctx.translate(-cx, -cy); ctx.globalAlpha = progress; break;
                        case 'Scorpione': ctx.translate(cx, cy); ctx.scale(0.8 + 0.2 * progress, 0.8 + 0.2 * progress); ctx.translate(-cx, -cy); ctx.globalAlpha = progress; break;
                        case 'Sagittario': ctx.translate(cx, cy); ctx.scale(1.2 - 0.2 * progress, 1.2 - 0.2 * progress); ctx.translate(-cx, -cy); ctx.globalAlpha = Math.pow(progress, 2); break;
                        case 'Capricorno': ctx.beginPath(); for (let i = 0; i < panelH; i += 12) if (progress > 0.5 || (i / 12) % 2 === 0) ctx.rect(panelX, panelY + panelH - (i + 12 * Math.min(1, progress * 2)), panelW, 12 * Math.min(1, progress * 2)); ctx.clip(); break;
                        case 'Acquario': ctx.beginPath(); ctx.rect(panelX, panelY, panelW, panelH * progress); ctx.clip(); break;
                        case 'Pesci': ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, Math.max(w, h), -Math.PI / 2, -Math.PI / 2 + (Math.PI * 2 * progress)); ctx.lineTo(cx, cy); ctx.clip(); break;
                    }
                }
                ctx.fillStyle = 'rgba(5, 5, 5, 0.85)';
                ctx.fillRect(panelX, panelY, panelW, panelH);
                let frameColor = currentTheme.console || COLORS.terminalGreen;
                if (frameColor.toLowerCase() === '#ffffff') frameColor = '#aaaaaa';
                ctx.strokeStyle = frameColor; ctx.lineWidth = 2; ctx.strokeRect(panelX, panelY, panelW, panelH);
                ctx.fillStyle = frameColor; const cp = 25; const ct = 4;
                ctx.fillRect(panelX, panelY, cp, ct); ctx.fillRect(panelX, panelY, ct, cp);
                ctx.fillRect(panelX + panelW - cp, panelY, cp, ct); ctx.fillRect(panelX + panelW - ct, panelY, ct, cp);
                ctx.fillRect(panelX, panelY + panelH - ct, cp, ct); ctx.fillRect(panelX, panelY + panelH - cp, ct, cp);
                ctx.fillRect(panelX + panelW - cp, panelY + panelH - ct, cp, ct); ctx.fillRect(panelX + panelW - ct, panelY + panelH - cp, ct, cp);
                const padding = isPortrait ? 20 : 35;
                let leftColX, leftColW, rightColX, rightColW;
                if (isPortrait) { leftColX = panelX + padding; leftColW = panelW - padding * 2; rightColX = leftColX; rightColW = leftColW; }
                else { const columnGap = 40; leftColW = (panelW - padding * 2 - columnGap) * 0.55; rightColW = (panelW - padding * 2 - columnGap) * 0.45; leftColX = panelX + padding; rightColX = leftColX + leftColW + columnGap; }
                const textBlockW = isPortrait ? leftColW : leftColW * 0.90;
                const horizontalOffset = isPortrait ? 0 : (leftColW - textBlockW) / 2;
                const textDrawX = leftColX + horizontalOffset;
                const bodyFontSize = isPortrait ? Math.min(20, area.w * 0.05) : Math.min(26, area.w * 0.045);
                ctx.font = `${bodyFontSize}px 'VT323', monospace`;
                const lineHeight = bodyFontSize * 1.2;
                const lines = this.getWrapTextLines(ctx, data.text, textBlockW);
                const specFontSize = isPortrait ? Math.min(16, area.w * 0.04) : Math.min(20, area.w * 0.035);
                ctx.font = `${specFontSize}px 'VT323', monospace`;
                const specLineHeight = specFontSize * 1.2;
                const specLines = [];
                if (data.specs) { data.specs.forEach(spec => { const wrapped = this.getWrapTextLines(ctx, "- " + spec, textBlockW); specLines.push(...wrapped); }); }
                const consoleFontSize = isPortrait ? Math.min(20, area.w * 0.05) : Math.min(26, area.w * 0.045);
                ctx.font = `bold ${consoleFontSize}px 'VT323', monospace`;
                const hwText = ` HW_ID // ${data.console} `;
                const badgeW = ctx.measureText(hwText).width + 10;
                const badgeH = consoleFontSize + 8;
                const hwSpacing = badgeH + (isPortrait ? 10 : 15);
                const specMarginTop = isPortrait ? 15 : 25;
                const specTitleHeight = specFontSize * 1.5;
                const textTotalHeight = hwSpacing + (lines.length * lineHeight) + specMarginTop + specTitleHeight + (specLines.length * specLineHeight);
                let textStartY;
                if (isPortrait) { textStartY = panelY + padding; } else { const textAvailableH = panelH - padding * 2; const verticalOffset = Math.max(0, (textAvailableH - textTotalHeight) / 2); textStartY = panelY + padding + verticalOffset; }
                ctx.save();
                ctx.beginPath(); ctx.rect(leftColX, panelY + padding, leftColW, panelH - padding * 2); ctx.clip();
                ctx.textAlign = 'left'; ctx.textBaseline = 'top';
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)'; ctx.fillRect(textDrawX, textStartY, badgeW, badgeH);
                ctx.strokeStyle = frameColor; ctx.lineWidth = 1; ctx.strokeRect(textDrawX, textStartY, badgeW, badgeH);
                ctx.fillStyle = frameColor; ctx.font = `bold ${consoleFontSize}px 'VT323', monospace`; ctx.fillText(hwText, textDrawX + 5, textStartY + 5);
                ctx.fillStyle = '#FFFFFF'; ctx.font = `${bodyFontSize}px 'VT323', monospace`;
                const bodyStartY = textStartY + hwSpacing;
                lines.forEach((l, i) => ctx.fillText(l, textDrawX, bodyStartY + (i * lineHeight)));
                const specTitleY = bodyStartY + (lines.length * lineHeight) + specMarginTop;
                ctx.fillStyle = frameColor; ctx.font = `bold ${specFontSize}px 'VT323', monospace`; ctx.fillText("/// SPECIFICHE TECNICHE:", textDrawX, specTitleY);
                ctx.fillStyle = '#AAAAAA'; ctx.font = `${specFontSize}px 'VT323', monospace`;
                const specListStartY = specTitleY + specTitleHeight;
                specLines.forEach((l, i) => ctx.fillText(l, textDrawX, specListStartY + (i * specLineHeight)));
                const allTextBottomY = specListStartY + (specLines.length * specLineHeight);
                ctx.restore();
                if (data.img && data.img.complete && data.img.naturalWidth > 0) {
                    ctx.save();
                    let imgMaxW = rightColW; let imgMaxH, imgX, imgY;
                    if (isPortrait) {
                        imgMaxH = panelH - padding * 3 - textTotalHeight;
                        if (imgMaxH > 60) {
                            const scale = Math.min(imgMaxW / data.img.naturalWidth, imgMaxH / data.img.naturalHeight);
                            const drawW = data.img.naturalWidth * scale; const drawH = data.img.naturalHeight * scale;
                            imgX = rightColX + (imgMaxW - drawW) / 2; imgY = allTextBottomY + padding + (imgMaxH - drawH) / 2;
                            ctx.fillStyle = '#000'; ctx.fillRect(imgX - 4, imgY - 4, drawW + 8, drawH + 8); ctx.drawImage(data.img, imgX, imgY, drawW, drawH);
                            ctx.strokeStyle = 'rgba(150,150,150,0.6)'; ctx.lineWidth = 2; ctx.strokeRect(imgX, imgY, drawW, drawH);
                        }
                    } else {
                        imgMaxH = panelH - padding * 2;
                        const scale = Math.min(imgMaxW / data.img.naturalWidth, imgMaxH / data.img.naturalHeight);
                        const drawW = data.img.naturalWidth * scale; const drawH = data.img.naturalHeight * scale;
                        imgX = rightColX + (imgMaxW - drawW) / 2; imgY = panelY + padding + (imgMaxH - drawH) / 2;
                        ctx.fillStyle = '#000'; ctx.fillRect(imgX - 4, imgY - 4, drawW + 8, drawH + 8); ctx.drawImage(data.img, imgX, imgY, drawW, drawH);
                        ctx.strokeStyle = 'rgba(150,150,150,0.6)'; ctx.lineWidth = 2; ctx.strokeRect(imgX, imgY, drawW, drawH);
                    }
                    ctx.restore();
                }
                if (progress < 1) {
                    if (themeName === 'Acquario') { ctx.fillStyle = '#ff0000'; ctx.shadowBlur = 15; ctx.shadowColor = '#ff0000'; ctx.fillRect(panelX, panelY + panelH * progress - 2, panelW, 4); ctx.shadowBlur = 0; }
                    else if (themeName === 'Leone') { ctx.fillStyle = `rgba(255, 255, 255, ${1 - progress})`; ctx.fillRect(panelX, panelY, panelW, panelH); }
                } else if (Math.floor(performance.now() / 400) % 2 === 0) {
                    ctx.fillStyle = currentTheme.text; ctx.font = `${specFontSize}px 'VT323', monospace`;
                    let lastLineWidth = 0;
                    if (specLines.length > 0) { lastLineWidth = ctx.measureText(specLines[specLines.length - 1]).width; } else { ctx.font = `${bodyFontSize}px 'VT323', monospace`; lastLineWidth = ctx.measureText(lines[lines.length - 1]).width; }
                    ctx.fillRect(textDrawX + lastLineWidth + 5, allTextBottomY - specLineHeight + 4, specFontSize / 2, specFontSize * 0.8);
                }
                ctx.restore(); ctx.restore();
            }
            executeSelection() { this.subState = 'DETAIL_VIEW'; this.loadSignData(this.selectedIndex); this.app.audio.playMenuBlip(); this.app.addMiniGlitch(); }
            goBack() { this.subState = 'MENU_VIEW'; this.textAnim.finishInstantly(); this.app.audio.playMenuBlip(); this.app.addMiniGlitch(); }
            handleClick() {
                if (this.subState === 'MENU_VIEW' && this.selectedIndex !== -1) this.executeSelection();
                else if (this.subState === 'DETAIL_VIEW') { if (this.isBackHovered) this.goBack(); else if (this.textAnim.progress < 1) this.textAnim.finishInstantly(); }
            }
        }

        /**
         * Controller Principale dell'Applicazione
         */
        class App {
            constructor() {
                this.canvas = document.getElementById('app'); this.ctx = this.canvas.getContext('2d', { alpha: false });
                this.audio = new RetroAudio(); this.mouseX = -100; this.mouseY = -100;
                this.isTouchDevice = false; this.currentState = 'intro'; this.activeScene = new IntroScene(this);
                this.particles = new ParticleSystem(window.innerWidth, window.innerHeight);
                this.glitchTimer = 0; this.miniGlitchTimer = 0; this.scanlinePattern = null;
                this.initEvents(); this.resize();
                requestAnimationFrame((t) => this.loop(t));
            }
            initEvents() {
                window.addEventListener('resize', () => this.resize());
                const updateMousePos = (e) => {
                    const rect = this.canvas.getBoundingClientRect();
                    let clientX = e.clientX; let clientY = e.clientY;
                    if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
                    this.mouseX = clientX - rect.left; this.mouseY = clientY - rect.top;
                };
                this.canvas.addEventListener('mousemove', updateMousePos);
                this.canvas.addEventListener('touchstart', (e) => { this.isTouchDevice = true; updateMousePos(e); }, { passive: false });
                this.canvas.addEventListener('touchmove', updateMousePos, { passive: false });
                this.canvas.addEventListener('click', () => { if (this.currentState !== 'glitching' && this.activeScene && this.activeScene.handleClick) this.activeScene.handleClick(); });
                window.addEventListener('keydown', (e) => { if (this.currentState === 'glitching') return; if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Enter", " "].indexOf(e.code) > -1) e.preventDefault(); if (this.activeScene && this.activeScene.handleKeyDown) this.activeScene.handleKeyDown(e); });
            }
            resize() {
                const dpr = window.devicePixelRatio || 1;
                // Usa le dimensioni del canvas/container, non della window
                this.width = this.canvas.offsetWidth || window.innerWidth;
                this.height = this.canvas.offsetHeight || window.innerHeight;
                this.canvas.width = this.width * dpr;
                this.canvas.height = this.height * dpr;
                this.canvas.style.width = `${this.width}px`;
                this.canvas.style.height = `${this.height}px`;
                this.ctx.scale(dpr, dpr);
                this.particles.resize(this.width, this.height);
                this.createScanlinesPattern();
            }
            createScanlinesPattern() {
                const offscreen = document.createElement('canvas'); offscreen.width = 1; offscreen.height = 4;
                const ctx = offscreen.getContext('2d'); ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; ctx.fillRect(0, 0, 1, 2);
                this.scanlinePattern = this.ctx.createPattern(offscreen, 'repeat');
            }
            triggerGlitchTransition() {
                this.currentState = 'glitching'; this.glitchTimer = performance.now(); this.audio.playGlitchSound();
                setTimeout(() => { this.currentState = 'dashboard'; this.activeScene = new DashboardScene(this); this.mouseX = -100; this.audio.startBGM(); }, 800);
            }
            addMiniGlitch() { this.miniGlitchTimer = 10; }
            drawPostProcessing(time) {
                const w = this.width; const h = this.height;
                if (this.scanlinePattern) { this.ctx.fillStyle = this.scanlinePattern; this.ctx.fillRect(0, 0, w, h); }
                const rollY = (time / 15) % (h * 1.5) - (h * 0.25);
                const rollGrad = this.ctx.createLinearGradient(0, rollY, 0, rollY + h * 0.15);
                rollGrad.addColorStop(0, 'rgba(255, 255, 255, 0)'); rollGrad.addColorStop(0.5, 'rgba(255, 255, 255, 0.03)'); rollGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
                this.ctx.fillStyle = rollGrad; this.ctx.fillRect(0, rollY, w, h * 0.15);
                const flicker = Math.random() * 0.02;
                const gradient = this.ctx.createRadialGradient(w / 2, h / 2, h * 0.5, w / 2, h / 2, h);
                gradient.addColorStop(0, `rgba(0,0,0,${0 + flicker})`); gradient.addColorStop(1, `rgba(0,0,0,${0.6 + flicker})`);
                this.ctx.fillStyle = gradient; this.ctx.fillRect(0, 0, w, h);
            }
            drawGlitchEffect(time) {
                const w = this.width; const h = this.height; const elapsed = time - this.glitchTimer;
                this.ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000'; this.ctx.fillRect(0, 0, w, h);
                for (let i = 0; i < 20; i++) { this.ctx.fillStyle = `rgb(${Math.random() * 255}, ${Math.random() * 255}, ${Math.random() * 255})`; this.ctx.fillRect(0, Math.random() * h, w, Math.random() * 50); }
                if (elapsed > 600) { this.ctx.fillStyle = '#000'; this.ctx.fillRect(0, 0, w, h); this.ctx.fillStyle = '#fff'; this.ctx.fillRect(0, h / 2 - 2, w, 4); }
            }
            drawCrosshair() {
                if (this.isTouchDevice) return;
                const ctx = this.ctx; ctx.save(); ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = COLORS.terminalGreen; ctx.lineWidth = 2; ctx.shadowBlur = 5; ctx.shadowColor = COLORS.terminalGreen;
                ctx.beginPath(); ctx.moveTo(this.mouseX - 12, this.mouseY); ctx.lineTo(this.mouseX - 4, this.mouseY); ctx.moveTo(this.mouseX + 4, this.mouseY); ctx.lineTo(this.mouseX + 12, this.mouseY); ctx.moveTo(this.mouseX, this.mouseY - 12); ctx.lineTo(this.mouseX, this.mouseY - 4); ctx.moveTo(this.mouseX, this.mouseY + 4); ctx.lineTo(this.mouseX, this.mouseY + 12); ctx.stroke();
                ctx.fillStyle = '#ff0033'; ctx.shadowColor = '#ff0033'; ctx.fillRect(this.mouseX - 1, this.mouseY - 1, 2, 2); ctx.restore();
            }
            loop(time) {
                this.ctx.save(); this.ctx.setTransform(1, 0, 0, 1, 0, 0); this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); this.ctx.restore();
                this.ctx.globalCompositeOperation = 'source-over'; this.ctx.fillStyle = COLORS.bg; this.ctx.fillRect(0, 0, this.width, this.height);
                this.particles.update(); this.particles.draw(this.ctx);
                if (this.currentState === 'intro' || this.currentState === 'dashboard') {
                    if (this.miniGlitchTimer > 0) { this.ctx.save(); this.ctx.translate((Math.random() - 0.5) * 10, (Math.random() - 0.5) * 10); this.miniGlitchTimer--; }
                    if (this.activeScene) { this.activeScene.update(time, this.mouseX, this.mouseY); this.activeScene.draw(this.ctx, this.width, this.height); }
                    if (this.miniGlitchTimer > 0) this.ctx.restore();
                } else if (this.currentState === 'glitching') { this.drawGlitchEffect(time); }
                this.drawPostProcessing(time); this.drawCrosshair();
                requestAnimationFrame((t) => this.loop(t));
            }
        }
        document.fonts.ready.then(() => { new App(); });
    </script>
