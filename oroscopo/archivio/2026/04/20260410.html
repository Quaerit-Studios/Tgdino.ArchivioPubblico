                            </div>
                        </div>

                        <div class="w-full text-center mt-4 bg-vanilla-custard-50/50 backdrop-blur-sm py-2">
                            <button class="text-[10px] uppercase tracking-widest font-bold border-b border-amber-earth-950 text-amber-earth-950 transition-opacity opacity-80 group-hover:opacity-100">
                                Leggi Presagio
                            </button>
                        </div>
                    </article>
                </div>
            `);
            DOM.postersContainer.innerHTML = htmlFragments.join('');
        }

        /**
         * Transizione Cinematografica (Fase 1 -> Fase 3)
         */
        function startExperience() {
            if (isAnimating) return;
            isAnimating = true;

            // Suono del Ciak all'inizio della transizione
            ciakSound.volume = 0.6;
            ciakSound.play().catch(e => console.log("Impossibile riprodurre l'audio automaticamente", e));

            DOM.phase1.classList.remove('opacity-100');
            DOM.phase1.classList.add('opacity-0', 'pointer-events-none');
            DOM.phase1.setAttribute('aria-hidden', 'true');

            setTimeout(() => {
                DOM.barTop.classList.remove('-translate-y-full');
                DOM.barBottom.classList.remove('translate-y-full');

                DOM.filmGrain.classList.remove('opacity-0');
                DOM.filmGrain.classList.add('opacity-20');

                setTimeout(() => {
                    DOM.filmGrain.classList.remove('opacity-20');
                    DOM.filmGrain.classList.add('opacity-0');
                }, 150);

            }, 400);

            setTimeout(() => {
                DOM.phase3Wrapper.classList.remove('opacity-0');
                DOM.phase3Wrapper.classList.remove('z-0');
                DOM.phase3Wrapper.classList.add('z-20');

                DOM.barTop.classList.add('-translate-y-full');
                DOM.barBottom.classList.add('translate-y-full');

                // Mostra frecce di navigazione
                DOM.btnLeft.classList.remove('hidden');
                DOM.btnRight.classList.remove('hidden');

                setTimeout(() => {
                    isAnimating = false;
                }, 800);

            }, 1400);
        }

        /**
         * Logica dello scroll della galleria tramite le frecce
         */
        function handleScrollArrows(direction) {
            const firstItem = DOM.postersContainer.firstElementChild;
            if (!firstItem) return;

            const itemWidth = firstItem.offsetWidth;
            const gap = parseFloat(window.getComputedStyle(DOM.postersContainer).gap) || 0;

            // Calcola quanti elementi sono mostrati contemporaneamente a seconda dello schermo
            const visibleItems = window.innerWidth >= 1024 ? 3 : (window.innerWidth >= 768 ? 2 : 1);

            // Scorre del totale calcolato in modo che entrino sempre 3 locandine intere
            const scrollAmount = (itemWidth + gap) * visibleItems;

            DOM.phase3Scroll.scrollBy({
                left: direction === 'right' ? scrollAmount : -scrollAmount,
                behavior: 'smooth'
            });
        }

        /**
         * Gestione Modale (Fase 4)
         */
        function openModal(index) {
            if (isAnimating) return;
            const data = zoodiacData[index];
            if (!data) return;

            DOM.mSign.textContent = data.sign;
            DOM.mHoroscope.textContent = data.horoscope;
            DOM.mTitle.textContent = data.movie;
            DOM.mYear.textContent = data.year;
            DOM.mGenre.textContent = data.genre;
            DOM.mPlot.textContent = data.plot;

            DOM.mArticle.style.backgroundColor = data.theme.main;
            DOM.mAside.style.backgroundColor = data.theme.accent;

            DOM.modalOverlay.classList.remove('opacity-0', 'pointer-events-none');
            DOM.modalOverlay.classList.add('opacity-100', 'pointer-events-auto');

            setTimeout(() => {
                DOM.modalContent.classList.remove('scale-95');
                DOM.modalContent.classList.add('scale-100');
            }, 50);
        }

        function closeModal() {
            DOM.modalContent.classList.remove('scale-100');
            DOM.modalContent.classList.add('scale-95');

            setTimeout(() => {
                DOM.modalOverlay.classList.remove('opacity-100', 'pointer-events-auto');
                DOM.modalOverlay.classList.add('opacity-0', 'pointer-events-none');
            }, 200);
        }

        function bindEvents() {
            DOM.btnStart.addEventListener('click', startExperience);

            // Click sulle frecce laterali
            DOM.btnRight.addEventListener('click', () => handleScrollArrows('right'));
            DOM.btnLeft.addEventListener('click', () => handleScrollArrows('left'));

            // Click sulle locandine
            DOM.phase3Scroll.addEventListener('click', (e) => {
                const wrapper = e.target.closest('[data-index]');
                if (wrapper) {
                    const idx = wrapper.getAttribute('data-index');
                    openModal(idx);
                }
            });

            DOM.btnCloseModal.addEventListener('click', closeModal);

            DOM.modalOverlay.addEventListener('click', (e) => {
                if (e.target === DOM.modalOverlay) {
                    closeModal();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !DOM.modalOverlay.classList.contains('opacity-0')) {
                    closeModal();
                } else if (e.key === 'ArrowRight' && DOM.modalOverlay.classList.contains('opacity-0') && !DOM.phase3Wrapper.classList.contains('opacity-0')) {
                    handleScrollArrows('right');
                } else if (e.key === 'ArrowLeft' && DOM.modalOverlay.classList.contains('opacity-0') && !DOM.phase3Wrapper.classList.contains('opacity-0')) {
                    handleScrollArrows('left');
                }
            });
        }

        // Boot
        initPosters();
        bindEvents();

    </script>
</body>

</html>
