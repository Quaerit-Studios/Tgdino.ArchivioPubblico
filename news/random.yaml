  title: "McDonald's presenta \"Archie\": il bizzarro gadget anti-AFK per i videogiocatori"
  description: |
    McDonald's ha svelato un accessorio decisamente insolito pensato per i gamer più incalliti: si chiama "Archie" ed è un dispositivo progettato per impedire ai giocatori di risultare inattivi (AFK, ovvero Away From Keyboard) mentre si godono un pasto. 
    L'unica nota dolente per i collezionisti? Sarà un'esclusiva del mercato turco.
  links: https://www.instagram.com/p/DWtsnxzDZva/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA==
