- id: 1
  title: "Falla critica su Telegram - Sticker animati a rischio, ma l'azienda smentisce"
  description: |
    Un nuovo allarme sicurezza scuote Telegram. Secondo i ricercatori della TrendAI Micro Zero Day Initiative, esisterebbe una gravissima vulnerabilità (con un punteggio di rischio di 9,8 su 10) capace di compromettere gli account tramite l'app per Android e Linux semplicemente ricevendo uno sticker animato, 
    senza richiedere alcuna interazione da parte dell'utente.

  links:
  - "https://multiplayer.it/notizie/telegram-falla-critica-zero-click-rischio-attacco-invisibile-sticker-azienda-nega.html"
