  title: "GTA 6 - I contenuti generati dagli utenti potrebbero rendere \"milionari\" i content creator"
  description: |
    Secondo le ultime indiscrezioni diffuse dal content creator HipHopGamer, l'attesissimo Grand Theft Auto VI non si limiterà ad arricchire le casse di Rockstar Games. Il nuovo capitolo della saga potrebbe infatti introdurre un sistema di contenuti generati dagli utenti (UGC) 
    così profondo da permettere ai creatori della community di diventare letteralmente dei "milionari".
  links:
  - "https://multiplayer.it/notizie/gta-6-renderebbe-tanti-creatori-contenuti-milionari-non-solo-rockstar-games.html"
