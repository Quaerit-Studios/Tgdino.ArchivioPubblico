  title: "Resident Evil Requiem - Capcom fa rimuovere oltre mille video con mod \"per adulti\" a uno YouTuber"
  description: |
    Capcom ha deciso di prendere provvedimenti severi contro la diffusione di contenuti alterati e non autorizzati. La casa di sviluppo giapponese ha infatti costretto uno YouTuber a rimuovere dal proprio canale la bellezza di oltre 1.000 video, 
    colpevoli di mostrare i personaggi del nuovo Resident Evil Requiem equipaggiati con mod "per adulti" e abiti decisamente succinti.
