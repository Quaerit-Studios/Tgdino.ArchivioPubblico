  title: "La scienza lo conferma: la \"depressione da fine gioco\" esiste (e i GDR sono i principali colpevoli)"
  description: |
    Se ti è mai capitato di fissare i titoli di coda di un videogioco sentendo un profondo senso di vuoto, sappi che non sei il solo e, soprattutto, non te lo sei immaginato. 
    Uno studio recente pubblicato sulla rivista scientifica Current Psychology ha ufficialmente analizzato e confermato l'esistenza della "post-game depression" (depressione da fine gioco).
  links:
  - "https://multiplayer.it/notizie/secondo-uno-studio-la-depressione-da-fine-gioco-esiste-ed-e-causata-specialmente-dai-gdr.html"
