  title: "Street Fighter 6 nella bufera - L'incesto canonico di Alex scatena i fan e le scuse di Capcom"
  description: |
    L'attesissimo debutto di Alex come personaggio DLC in Street Fighter 6 si è trasformato in un incubo per Capcom. Il ritorno del lottatore newyorkese è stato infatti oscurato da un dettaglio svelato nel finale della sua modalità Arcade: Alex ha sposato Patricia, 
    che la lore del gioco stabilisce essere sua cugina di secondo grado nonché sorella adottiva minore, e i due aspettano una bambina.

