- id: 2
  title: "Xbox - Previsti ingenti investimenti per ricostruire e unificare"
  description: |
    Microsoft sembra pronta a una vera e propria rivoluzione interna per il proprio marchio videoludico. Secondo un memo interno trapelato e diffuso dalla redazione di The Verge, la CEO di Microsoft Gaming, Asha Sharma, ha evidenziato la 
    necessità di stanziare ingenti investimenti strutturali per riorganizzare dalle fondamenta e unificare la piattaforma Xbox.
  links:
  - "https://multiplayer.it/notizie/xbox-starebbe-pianificando-enormi-investimenti-per-ricostruire-e-unificare-la-piattaforma.html"

- id: 3
  title: "Call of Duty - Il film live-action ha una data d'uscita ufficiale"
  description: |
    Dopo mesi di silenzio, il progetto cinematografico basato sul franchise sparatutto di Activision torna a far parlare di sé. Paramount e Activision hanno infatti confermato la data in cui il film di 
    Call of Duty farà il suo debutto sul grande schermo, svelando anche alcuni dei nomi coinvolti nella produzione.
  links:
  - "https://multiplayer.it/notizie/il-film-di-call-of-duty-ha-una-data-di-uscita-annunciata.html"
