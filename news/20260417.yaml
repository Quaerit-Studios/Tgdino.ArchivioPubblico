  title: "Jackass: Best and Last - Svelato il titolo dell'ultimo capitolo della saga"
  description: |
    Il celebre e irriverente franchise di Jackass si prepara a calare il sipario con un ultimo appuntamento. È stato infatti svelato ufficialmente 
    il titolo di quello che si preannuncia essere il film conclusivo della storica saga: Jackass: Best and Last.
