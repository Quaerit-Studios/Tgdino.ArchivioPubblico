- id: 1
  title: "The Legend of Zelda - Il film live-action in produzione nelle storiche location de \"Il Signore degli Anelli\""
  description: |
    L'atteso adattamento cinematografico in live-action di The Legend of Zelda è attualmente in fase di riprese negli stessi iconici paesaggi naturali 
    (in Nuova Zelanda) che hanno fatto da sfondo alla trilogia de Il Signore degli Anelli di Peter Jackson.
