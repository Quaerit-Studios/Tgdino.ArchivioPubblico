- id: 2
  title: "Artemis II - La NASA cita \"Project Hail Mary\" per la Luna"
  description: |
    Durante lo storico sorvolo, il centro di controllo ha usato la celebre esclamazione dell'alieno Rocky. Ammirando il lato oscuro della Luna, la NASA ha esclamato "Amaze, amaze, amaze!" in diretta con la navicella Orion. La frase omaggia l'alieno del film Project Hail Mary, che ripete le parole per esprimere forte stupore e meraviglia. 
    Un simpatico tributo alla fantascienza, guardata dallo stesso equipaggio spaziale pochi giorni prima della partenza.
  links:
  - "https://www.instagram.com/p/DWzu2b6jfYG/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "Crimson Desert - Il mondo di gioco diventa \"troppo pacifico\" e i fan si lamentano"
  description: |
    A poche settimane dal lancio del action RPG di Pearl Abyss, una precisa scelta di game design sta iniziando a dividere profondamente la community: 
    la maggior parte dei nemici non ricompare dopo essere stata sconfitta, svuotando progressivamente la mappa di gioco.
  links:
  - "https://www.instagram.com/p/DWz8lYHjZE3/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
