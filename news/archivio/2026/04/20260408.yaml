- id: 1
  title: "The Legend of Zelda - Far parlare Link nel film live-action potrebbe rovinare la magia della serie"
  description: |
    L'adattamento in live-action di The Legend of Zelda si trova di fronte a una delle sfide creative più insidiose per la produzione: dare o non dare una voce al protagonista. A sollevare la questione è intervenuto Takaya Imamura, storico ex art director di Nintendo (celebre per il suo lavoro su Majora's Mask e altri), 
    che ha condiviso le proprie perplessità su questa potenziale scelta stilistica.
  links:
  - "https://www.instagram.com/p/DW14L2ijKwK/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Malcolm in the Middle - Dewey ha rifiutato \"una barca di soldi\" per tornare a recitare"
  description: |
    Jane Kaczmarek, Lois della storica sitcom Malcolm in the Middle, ha recentemente fatto luce sul destino di uno dei membri più amati del cast, Erik Per Sullivan. L'attore, celebre per aver interpretato lo stravagante Dewey, 
    ha infatti deciso di abbandonare definitivamente Hollywood, rifiutando offerte economiche da capogiro per dedicarsi ad altro.
  links:
  - "https://www.instagram.com/p/DW1_DDWCQPc/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "PlayStation - Il prossimo State of Play potrebbe arrivare molto prima di giugno"
  description: |
    Un noto leaker ha riacceso le speranze della community PlayStation in vista delle novità per i mesi estivi e autunnali. Secondo le ultime indiscrezioni, il prossimo State of Play di Sony non sarebbe poi così 
    lontano e potrebbe tenersi con largo anticipo rispetto alla consueta finestra degli annunci di giugno della Summer Game Fest.
  links:
  - "https://multiplayer.it/notizie/prossimo-state-of-play-di-sony-non-sarebbe-troppo-lontano.html"
