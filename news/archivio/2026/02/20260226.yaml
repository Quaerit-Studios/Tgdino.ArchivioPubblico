- id: 1
  title: "Un primo sguardo a The Mummy di Lee Cronin"
  description: |
    È stata pubblicata una clip inedita di The Mummy, il nuovo horror diretto da Lee Cronin (Evil Dead Rise) in arrivo nelle sale il 17 aprile 2026. 
    Il breve filmato conferma il tono crudo e inquietante scelto dal regista, che ha promesso una reinterpretazione del mito della mummia lontana dall'avventura classica e più vicina al genere horror psicologico e viscerale.
  links:
  - "https://youtu.be/d3B23h63MCA?si=8Oe6jupDZrjCxtp7"

- id: 2
  title: "Zootopia 2 supera A Minecraft Movie"
  description: |
    Grazie a un totale di 424,2 milioni di dollari incassati in Nord America, 
    Zootopia 2 ha ufficialmente scalzato A Minecraft Movie (fermo a 424,08 milioni) diventando il film di maggior successo del 2025 negli Stati Uniti. Il sorpasso è avvenuto per un margine ristrettissimo.
  links:
  - "https://www.instagram.com/p/DVMoMMHEniC"

- id: 3
  title: "Sony valuta il taglio dei porting PC per i titoli single player"
  description: |
    Mentre i giochi multiplayer continueranno a debuttare in contemporanea su entrambe le piattaforme, le grandi avventure narrative potrebbero tornare a essere esclusive totali dell'ecosistema PlayStation per incentivare l'acquisto delle console. 
    Il primo titolo coinvolto in questa inversione di rotta potrebbe essere Marvel's Wolverine.
  links:
  - "https://multiplayer.it/notizie/sony-potrebbe-ridurre-il-lancio-di-esclusive-playstation-single-player-su-pc-per-un-giornalista.html"
