- id: 1
  title: "Ubisoft conferma lo sviluppo di due nuovi titoli di Far Cry"
  description: |
    Il CEO Yves Guillemot ha ufficializzato che la compagnia ha in cantiere due nuovi progetti. 
    I report indicano Far Cry 7 (Project Blackbird), con struttura non lineare e limite di tempo in-game per salvare la famiglia del protagonista, e Project Maverick, uno spin-off multiplayer di tipo extraction shooter ambientato tra i ghiacci dell'Alaska.
  links:
  - "https://www.instagram.com/p/DU_HBKLjUlO"

- id: 2
  title: "I Gorillaz annunciano un cortometraggio con brani inediti"
  description: |
    Uscita ufficiale per il cortometraggio che accompagnerà il lancio del nuovo album 'The Mountain'. 
    La pellicola includerà diverse tracce inedite fuori dalla tracklist standard, approfondendo la narrazione dei membri virtuali della band in collaborazione con lo studio di animazione di Jamie Hewlett.
  links:
  - "https://youtu.be/c7UotLxLSU8?si=eD5eebXrdj71cLbR"

- id: 3
  title: "Evangelion: nuova serie scritta da Yoko Taro e Keiichi Okabe"
  description: |
    Studio Khara celebra il 30° anniversario con una nuova serie anime. Il progetto segna una collaborazione storica: Yoko Taro (NieR) alla sceneggiatura e Keiichi Okabe alla colonna sonora. 
    Regia affidata a Kazuya Tsurumaki e Toko Yatabe, con la produzione di Studio Khara e CloverWorks.
  links:
  - "https://www.instagram.com/p/DVGqB17DiPa"
