  title: "Film di Super Mario Galaxy, trapela un nome familiare nel cast"
  description: |
    La descrizione di una catena cinematografica ha rivelato la presenza di un personaggio non ancora annunciato per l'atteso lungometraggio. 
    Sebbene il cast sia mantenuto segreto da Nintendo e Illumination, il leak trapela il nome di Wario, poi rimosso dal documento ufficiale.
  links:
