- id: 2
  title: "Asha Sharma risponde alle critiche e svela i suoi giochi preferiti"
  description: |
    La nuova responsabile gaming di Microsoft ha replicato alle perplessità sul suo background focalizzato sull'IA. 
    Sharma ha citato i suoi tre titoli preferiti di sempre: Halo, Valheim e GoldenEye, sottolineando come la sua competenza tecnologica guiderà Xbox verso una nuova era di innovazione.
  links:
  - "https://www.instagram.com/p/DVHHncECSdr"

- id: 3
  title: "Scomparsa di Robert Carradine, addio al protagonista di Revenge of the Nerds"
  description: |
    L'attore Robert Carradine è deceduto a 71 anni. 
    Celebre per aver interpretato Lewis Skolnick nella saga cult, Carradine è stato un volto iconico sia per il cinema degli anni '80 che per la TV, recitando in Escape from L.A. e interpretando il padre in Lizzie McGuire.
  links:
  - "https://www.instagram.com/p/DVJaMvJjtBp"
