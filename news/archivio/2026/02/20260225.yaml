- id: 1
  title: "Daniel Radcliffe: «Terrò segreto Harry Potter a mio figlio»"
  description: |
    L'attore ha dichiarato di voler posticipare il più possibile il momento in cui suo figlio scoprirà il suo passato nei panni di Harry Potter. 
    Preferirebbe evitare l'impatto di vedere il padre in un ruolo così iconico, ipotizzando scherzosamente di fargli guardare direttamente la nuova serie TV di HBO anziché i film originali.
  links:
  - "https://www.instagram.com/p/DVJn9Cpmawc"

- id: 2
  title: "Jackass 5 sarà l'ultimo capitolo della saga"
  description: |
    Johnny Knoxville ha confermato che il quinto film di Jackass segnerà la fine definitiva del franchise. 
    Data l'età dei protagonisti e i rischi sempre più elevati, Knoxville ha sottolineato come la decisione sia questa volta irrevocabile, chiudendo un'era iniziata oltre vent'anni fa su MTV.
  links:
  - "https://www.instagram.com/p/DVLjhk2Dwoe"

- id: 3
  title: "Avvistamenti UFO nei cieli di Arc Raiders"
  description: |
    I giocatori hanno segnalato la comparsa di misteriosi UFO di enormi dimensioni tra le nuvole in seguito al rilascio dell'aggiornamento 'Shrouded Sky'. 
    Nonostante il silenzio degli sviluppatori, il titolo continua a macinare record con 14 milioni di copie vendute e una roadmap pianificata fino al 2026.
  links:
  - "https://multiplayer.it/notizie/i-giocatori-di-arc-raiders-stanno-iniziando-a-vedere-degli-ufo.html"
