- id: 1
  title: "Ufficiale la data di Toy Story 5, sarà una sfida tra giocattoli e tecnologia"
  description: |
    Disney e Pixar hanno fissato l’uscita di Toy Story 5 per il 17 giugno 2026. 
    Il nuovo capitolo, diretto da Andrew Stanton, vedrà i protagonisti impegnati a contrastare l’ossessione dei bambini per i tablet e i dispositivi elettronici, affrontando come antagonisti il tablet Lilypad e una serie di unità Buzz Lightyear malfunzionanti.
  links:
  - "https://youtu.be/aXukzPfBEOg?si=VaY7OlcafbRMkfVM"

- id: 2
  title: "Leak massicci per Resident Evil Requiem"
  description: |
    A pochi giorni dal lancio ufficiale del 27 febbraio 2026, l’intero finale e i colpi di scena chiave di Resident Evil Requiem sono trapelati in rete. 
    La fuga di notizie, causata dalla distribuzione anticipata di alcune copie fisiche, ha inondato i social di video gameplay e dettagli sulla trama. Capcom ha promesso "azioni ferme" contro la diffusione del materiale.
  links:
  - "https://www.instagram.com/p/DU9JtB8jIGm"

- id: 3
  title: "PlayStation annuncia la chiusura di Bluepoint Games"
  description: |
    La decisione di chiudere lo studio texano, celebre per i remake di Demon's Souls e Shadow of the Colossus, comporterà il licenziamento di circa 70 dipendenti. 
    La chiusura segue una revisione aziendale e la cancellazione di un progetto live-service ambientato nell'universo di God of War.
  links:
  - "https://www.instagram.com/p/DU9QkZDjQVE"

- id: 4
  title: "Scomparsa di Eric Dane, l'attore di Grey's Anatomy muore a 53 anni"
  description: |
    La morte è sopraggiunta a causa di complicazioni legate alla SLA, malattia che l'attore aveva reso pubblica nell'aprile del 2025. 
    Dane era diventato un attivo sostenitore della ricerca sulla patologia, condividendo la sua battaglia per sensibilizzare l'opinione pubblica.
  links:
  - "https://www.instagram.com/p/DU9n0lSjM_Q"
