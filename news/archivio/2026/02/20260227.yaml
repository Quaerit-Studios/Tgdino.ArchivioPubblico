- id: 1
  title: "Amazon svela la prima foto di God of War"
  description: |
    Proprio oggi, 27 febbraio 2026, Prime Video ha celebrato l'inizio ufficiale della produzione con la prima immagine dal set di God of War. 
    La foto mostra Ryan Hurst (già voce di Thor nei giochi) nei panni di Kratos e il giovanissimo Callum Vinson in quelli di Atreus. 
    Lo scatto, che ha già diviso i fan per l'estetica "molto fedele ma quasi da cosplay".
  links:
  - "https://www.instagram.com/p/DVRCDdsDlBb"

- id: 2
  title: "Resident Evil Requiem - è il miglior lancio della saga"
  description: |
    A pochissime ore dal debutto ufficiale del 27 febbraio 2026, Resident Evil Requiem ha già riscritto la storia del franchise su PC. 
    Il titolo ha raggiunto un picco di 267.509 giocatori contemporanei su Steam, superando agevolmente i record precedentemente stabiliti da Resident Evil Village e dal remake di Resident Evil 4. 
    Questo risultato lo lancia nella top dei titoli horror più giocati di sempre.
  links:
  - "https://www.instagram.com/p/DVQtHOtDq4Y"

- id: 3
  title: "Pokémon Winds & Waves - La Decima Generazione"
  description: |
    I giochi arriveranno in esclusiva su Nintendo Switch 2 nel 2027. L’ambientazione sarà una regione tropicale ispirata all'Indonesia, con focus sull'esplorazione dei cieli e dei fondali marini (tramite un nuovo "Rotom Scooter"). 
    Gli starter saranno: Browt (Erba), Pombon (Fuoco), Gecqua (Acqua).
  links:
  - "https://www.instagram.com/p/DVQ9Eksjvex"
