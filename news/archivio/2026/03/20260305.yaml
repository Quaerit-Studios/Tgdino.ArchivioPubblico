- id: 1
  title: "The Boys - Oggi il trailer finale dell'ultima stagione su Prime Video"
  description: |
    Il filmato segna l'inizio del conto alla rovescia per l'epica conclusione dello scontro tra Billy Butcher e Patriota, promettendo di svelare le prime immagini della resa dei conti definitiva. 
    Dopo anni di eccessi e satira feroce, lo showrunner Eric Kripke si prepara a chiudere i battenti della serie principale, lasciando spazio ai numerosi spin-off già in produzione per espandere l'universo dei Super.
  links:
  - "https://youtu.be/XNQbH1SDPRk?si=x91znJZas0hgYhzo"

- id: 2
  title: "Assassin's Creed: Black Flag Resynced - Il remake arriverà entro fine 2026"
  description: |
    Il titolo, sviluppato da Ubisoft Singapore con il supporto degli studi di Montreal, promette una ricostruzione totale dei Caraibi grazie al motore di Assassin's Creed Shadows, con un sistema di navigazione evoluto e combattimenti navali ancora più spettacolari. 
    Sebbene non ci sia ancora una data precisa, l'azienda ha confermato che il gioco sarà uno dei pilastri della lineup autunnale per PC, PS5 e Xbox Series X/S.
  links:
  - "https://www.instagram.com/p/DVewnoKD7e_"

- id: 3
  title: "Sony lancia DualSense PC Ready"
  description: |
    Una versione del controller (nella colorazione Midnight Black) venduta con cavo USB-C incluso e ottimizzata per PC. 
    La mossa ha generato confusione poiché arriva in concomitanza con un report di Bloomberg che indica un drastico cambio di rotta: Sony avrebbe cancellato i futuri porting di esclusive single-player su PC (come Ghost of Yotei e Saros) per tornare a puntare sull'unicità dell'hardware PlayStation. 
    Mentre gli accessori si aprono al desktop, i giochi sembrano destinati a tornare "solo su console".
  links:
  - "https://multiplayer.it/notizie/sony-ha-annunciato-un-dualsense-pc-ready-confondendo-un-po-tutti.html"
