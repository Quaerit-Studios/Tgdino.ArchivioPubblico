- id: 1
  title: "Pinocchio Unstrung - Svelato il trailer dell'horror con Robert Englund"
  description: |
    Il franchise del Poohniverse continua a espandersi con il primo trailer ufficiale di Pinocchio: Unstrung. Diretto da Rhys Frake-Waterfield, il film trasforma il burattino in un killer spietato. 
    Il cast vanta Richard Brake nel ruolo di Geppetto e la leggenda Robert Englund come voce del Grillo Parlante. Debutto nelle sale previsto per il 7 maggio 2026.
  links:
  - "https://youtu.be/uApioBmGpAc?si=KbGH3ix7n8jz84Oh"

- id: 2
  title: "Jim Carrey ai César 2026 - Smentiti i rumor sul \"clone\""
  description: |
    Gli organizzatori dei César Awards hanno ufficialmente smentito le teorie complottiste secondo cui Jim Carrey sarebbe stato sostituito da un clone o deepfake. 
    La performance trasformista dell'attore per ricevere il premio alla carriera è stata definita il frutto di mesi di pianificazione per celebrare il suo legame con la comicità fisica.
  links:
  - "https://www.instagram.com/p/DVZnB3VDHYo"

- id: 3
  title: "Capcom Spotlight il 5 marzo: novità su Pragmata e Monster Hunter"
  description: |
    Annunciato un nuovo Spotlight per il 5 marzo alle ore 23:00. 
    La presentazione di 30 minuti sarà dedicata ai titoli in arrivo nel 2026 e 2027, con riflettori puntati su Pragmata, Monster Hunter Stories 3: Twisted Reflection e le novità della serie Mega Man, inclusa la Star Force Legacy Collection.
  links:
  - "https://multiplayer.it/notizie/capcom-ha-annunciato-un-nuovo-spotlight-ecco-quando-verra-trasmesso.html"
