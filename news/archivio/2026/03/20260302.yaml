- id: 1
  title: "Markiplier teme l'etichetta di \"regista dei videogiochi\""
  description: |
      Nonostante l'incredibile incasso di 50 milioni di dollari per il suo debutto cinematografico Iron Lung, Markiplier ha dichiarato di voler evitare la "trappola" degli adattamenti videoludici. 
      Lo YouTuber teme che concentrarsi solo sull'horror lo renderebbe prevedibile, limitando la sua credibilità come autore originale. 
      Per questo motivo, ha annunciato che il suo prossimo progetto dovrà basarsi su un'idea inedita per dimostrare il suo valore artistico oltre il mondo del gaming.
  links:
    - "https://www.instagram.com/p/DVXCHq0jFX5"

- id: 2
  title: "Faye potrebbe essere la protagonista del nuovo God of War"
  description: |
      Secondo l'insider NateTheHate, il prossimo capitolo della saga di Santa Monica Studio sarà un prequel incentrato su Faye, la guerriera Jötunn e madre di Atreus. 
      Il gioco, che dovrebbe essere presentato entro la fine del 2026 per un lancio nel 2027, segnerebbe un ritorno a un gameplay più orientato all'azione pura, esplorando il primo incontro tra la donna e Kratos. 
      Nonostante manchi l'ufficialità, l'indiscrezione coincide con il desiderio espresso in passato da Cory Barlog.
  links:
    - "https://multiplayer.it/notizie/la-protagonista-del-nuovo-god-of-war-potrebe-essere-faye.html"

- id: 3
  title: "Nintendo Indie World - Nuovo evento domani 3 marzo"
  description: |
      La presentazione alle ore 15:00 sarà focalizzata sui titoli indipendenti in arrivo sia su Nintendo Switch che sulla nuova Switch 2, offrendo uno sguardo ai progetti che popoleranno l'eShop nei prossimi mesi. 
      Nonostante le speranze dei fan siano ormai ridotte al lumicino, la community attende con curiosità di scoprire se ci saranno finalmente novità su titoli "dispersi" o se verranno svelate nuove IP originali.
  links:
    - "https://multiplayer.it/notizie/prossimo-nintendo-indie-world-domani-ora.html"
