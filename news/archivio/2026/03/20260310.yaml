- id: 1
  title: "The Super Mario Galaxy Movie - Trailer finale e uscita il 1° aprile"
  description: |
    Nintendo e Illumination hanno celebrato il MAR10 Day (10 marzo 2026) rilasciando il trailer finale di The Super Mario Galaxy Movie, confermando l'uscita nelle sale italiane e internazionali per il 1° aprile 2026. 
    Il film, sequel del successo da 1,3 miliardi di dollari del 2023, porterà Mario e compagni nello spazio profondo per affrontare Bowser Jr. e salvare l'universo.
  links:
  - "https://youtu.be/9BqzYJ1rHbw?si=vLy1_Rc2AQMSl6Y4"

- id: 2
  title: "Resident Evil Requiem: in arrivo un’espansione della storia e un nuovo mini-gioco"
  description: |
    Il director Koshi Nakanishi ha confermato oggi, 10 marzo 2026, che Capcom è ufficialmente al lavoro su un’espansione narrativa per Resident Evil Requiem. 
    Dopo il successo del lancio (5 milioni di copie in 5 giorni), il team intende "approfondire ulteriormente il mondo di Requiem" con nuovi contenuti che, secondo i rumor, potrebbero concentrarsi su Leon S. 
    Kennedy o introdurre legami con i futuri remake di Code Veronica e Resident Evil Zero
  links:
  - "https://www.instagram.com/p/DVtIuXKjAUr"

- id: 3
  title: "PRS for Music contro Valve - La musica su Steam finisce in tribunale"
  description: |
    L'organizzazione britannica PRS for Music (la "SIAE" del Regno Unito) ha avviato una causa legale contro Valve Corporation, accusandola di distribuire migliaia di videogiochi su Steam contenenti brani del proprio repertorio senza aver mai ottenuto le licenze necessarie. 
    Nonostante gli editori dei giochi (come Rockstar per GTA o EA per EA Sports FC) paghino già per inserire la musica nei titoli, PRS sostiene che Valve, in quanto piattaforma di distribuzione, necessiti di una licenza separata per la "messa a disposizione del pubblico" tramite download e streaming, una pratica già regolarizzata da colossi come Sony, Microsoft, Netflix e Disney+.
  links:
  - "https://multiplayer.it/notizie/la-siae-britannica-ha-fatto-causa-a-valve-per-i-diritti-musicali-dei-videogiochi-su-steam.html"
