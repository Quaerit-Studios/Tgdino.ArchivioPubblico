  title: "Pokémon Pokopia - Debutto con 2,2 milioni di copie su Switch 2"
  description: |
    Il titolo, che mescola le dinamiche classiche della serie con elementi life-sim alla Animal Crossing e meccaniche di costruzione, 
    si attesta come il primo vero successo della neonata Nintendo Switch 2. Nonostante le recenti controversie legate all'uso improprio della sua estetica da parte della Casa Bianca, l'accoglienza del pubblico è stata massiccia, premiando la nuova direzione artistica e tecnica del franchise.
  links:
  - "https://www.instagram.com/p/DVyZLpkDLqv"

- id: 2
  title: "Fox annuncia lo spin-off \"Stewie\" da Family Guy"
  description: |
    La serie, annunciata oggi 12 marzo 2026, ha già ricevuto un ordine per due stagioni e debutterà durante la stagione televisiva 2027-2028. 
    Seth MacFarlane tornerà a prestare la voce dell'irascibile neonato prodigio, oltre a ricoprire il ruolo di produttore esecutivo. Lo showrunner sarà invece Kirker Butler, veterano della serie originale e autore di episodi cult come lo speciale di Star Wars.
  links:
  - "https://www.instagram.com/p/DVypbtEFHbO"

- id: 3
  title: "Disclosure Day - Il trailer ufficiale"
  description: |
    Universal Pictures ha rilasciato oggi, 12 marzo 2026, il trailer ufficiale di Disclosure Day, l’attesissimo ritorno di Steven Spielberg al cinema sci-fi sugli UFO. Scritto insieme allo storico collaboratore David Koepp (Jurassic Park), 
    il film arriverà nelle sale italiane l’11 giugno 2026 (il 12 giugno negli USA). 
    La pellicola promette di esplorare l'impatto psicologico e sociale della rivelazione che l'umanità non è sola nell'universo, virando verso il thriller cospirativo piuttosto che verso l'azione pura.
  links:
  - "https://youtu.be/89uCBeGBIJQ?si=sdVKtVRcI5QeNzP9"
