- id: 1
  title: "Amy Madigan vince l'Oscar per la \"Zia Gladys\" di Weapons"
  description: |
    Nella notte del 15 marzo 2026, Amy Madigan ha conquistato la sua prima statuetta come Miglior Attrice Non Protagonista alla 98ª edizione degli Academy Awards. 
    La sua interpretazione della inquietante e malevola Aunt Gladys nel film horror Weapons di Zach Cregger non solo ha convinto l'Academy, ma ha superato la concorrenza di favorite come Teyana Taylor (One Battle After Another) e Wunmi Mosaku (Sinners).
  links:
  - "https://www.instagram.com/p/DV7GFa1jt0W"

- id: 2
  title: "Kpop Demon Hunters agli Oscar 2026 - Doppietta storica per Netflix"
  description: |
    È ufficiale: Kpop Demon Hunters ha vinto l'Oscar come Miglior Film d'Animazione alla 98ª edizione degli Academy Awards. 
    Il film di Sony Pictures Animation e Netflix ha sbaragliato la concorrenza di titoli come Zootopia 2 e Elio, coronando una stagione di premi che l'aveva già visto trionfare ai Golden Globes e agli Annie Awards. 
    Ma la serata non si è fermata qui, la hit "Golden" ha vinto anche l'Oscar per la Miglior Canzone Originale, rendendolo il primo brano K-pop nella storia a conquistare la statuetta.
  links:
  - "https://www.instagram.com/p/DV7HOlCjv4s"

- id: 3
  title: "Splatchinko - Il roguelike spaziale dagli autori di Death Noodle Delivery"
  description: |
    Lo studio italiano Stupidi Pixel ha ufficialmente presentato Splatchinko, un eccentrico roguelike basato sulla meccanica del pachinko. 
    Dopo il successo di critica del loro precedente titolo cyberpunk, Death Noodle Delivery, il team torna con una proposta che fonde la dipendenza strategica di titoli come Balatro e Peglin a un'estetica surreale. 
    Nel gioco, dovrai lanciare "bulbi oculari" contro pianeti nevrotici, cercando di attivare combo esplosive e mutazioni genetiche per scalare i punteggi.
  links:
  - "https://multiplayer.it/notizie/splatchinko-e-il-nuovo-gioco-dagli-autori-di-death-noodle-delivery.html"
