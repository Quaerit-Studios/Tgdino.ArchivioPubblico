- id: 1
  title: "Forgotten Island - Svelato il trailer del nuovo film DreamWorks"
  description: |
    Si tratta di un’avventura fantasy in arrivo nelle sale americane il 25 settembre 2026 (e a ottobre nel resto d'Europa). Scritto e diretto da Joel Crawford e Januel Mercado, il duo dietro Il Gatto con gli Stivali 2: L'Ultimo Desiderio, 
    il film promette di mescolare folklore filippino, carica emotiva e un'estetica visiva di alto livello.
  links:
  - "https://youtu.be/a8RHqN93qfo?si=t5G4g30TxOTo1pEx"

- id: 2
  title: "I costi dei giochi AAA superano i 300 milioni di dollari"
  description: |
    Secondo le ultime rivelazioni del giornalista Jason Schreier, i costi medi per sviluppare un videogioco tripla A negli Stati Uniti hanno sfondato il muro dei 300 milioni di dollari, 
    escludendo peraltro le massicce spese di marketing. Questo dato evidenzia come l'attuale modello di business dell'industria videoludica sia diventato estremamente rischioso e sempre più insostenibile per le grandi compagnie.
  links:
  - "https://multiplayer.it/notizie/i-costi-dei-giochi-aaa-avrebbero-superato-i-300-milioni-di-dollari-di-media-senza-contare-il-marketing.html"

- id: 3
  title: "Super Mario Galaxy - Il Film: Nintendo svela a sorpresa il cameo di Fox McCloud"
  description: |
    A meno di una settimana dall'uscita nelle sale, Nintendo e Illumination hanno rilevato apertamente una delle sorprese più grandi della pellicola: Fox McCloud, 
    l'iconico pilota e protagonista della serie Star Fox, farà la sua apparizione ufficiale in Super Mario Galaxy - Il Film. La conferma è arrivata direttamente tramite i canali social delle due aziende con una locandina dedicata, 
    dando ragione ai fan più attenti che avevano scovato un minuscolo indizio in un trailer precedente.
  links:
  - "https://www.instagram.com/p/DWUWat9iSI5/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
