- id: 1
  title: "Gang of Dragon a rischio - NetEase taglia i fondi a Nagoshi Studio"
  description: |
    Il futuro di Gang of Dragon, l'action-adventure di Toshihiro Nagoshi (creatore di Yakuza), è diventato improvvisamente incerto. 
    Secondo un report di Bloomberg del 7 marzo 2026, il colosso cinese NetEase ha deciso di interrompere i finanziamenti allo studio a partire dal prossimo maggio. 
    La rottura sarebbe avvenuta dopo la scoperta che il progetto necessita di ulteriori 7 miliardi di yen (circa 44,4 milioni di dollari) per essere completato
  links:
  - "https://www.instagram.com/p/DVm6WvZDbEz"

- id: 2
  title: "Shinji Mikami svela Unbound Games: al lavoro su un AAA in Unreal Engine 5"
  description: |
    Il creatore di Resident Evil ha rotto il silenzio sul suo nuovo studio, Unbound Games. 
    Fondato nel maggio 2023, il team conta già 50 dipendenti (con l'obiettivo di arrivare a 150) e include veterani che hanno lavorato a giochi come Silent Hill, Shadow of the Colossus e Hi-Fi Rush. 
    Il primo progetto ufficiale sarà una nuova IP originale AAA sviluppata in Unreal Engine 5, destinata a PC, PS5 e Xbox Series
  links:
  - "https://multiplayer.it/notizie/nuovo-studio-shinji-mikami-resident-evil-dino-crisis-vanquish-lavora-ip-aaa-originale.html"

- id: 3
  title: "Project Helix - La nuova Xbox potrebbe costare oltre 1.000€"
  description: |
    Nuove indiscrezioni da parte dell'insider Moore's Law is Dead delineano un posizionamento decisamente "luxury" per Project Helix. 
    La prossima console Microsoft, che ricordiamo potrà eseguire nativamente anche i giochi PC, potrebbe avere un prezzo di lancio compreso tra 999$ e 1.200$, con il rischio concreto che in Italia superi i 1.100€ o 1.200€ a causa della conversione e della tassazione. 
    Si tratterebbe della console più costosa della storia, giustificata però da un hardware che Asha Sharma ha definito "leader per prestazioni" e che si preannuncia sensibilmente superiore a quello di PS6
  links:
  - "https://multiplayer.it/notizie/xbox-project-helix-potrebbe-costare-piu-di-1000-euro.html"
