- id: 1
  title: "Malcolm in the Middle: Life's Still Unfair - Il ritorno dei Wilkerson su Hulu"
  description: |
    A vent'anni di distanza, il trailer ufficiale di Malcolm in the Middle: Life's Still Unfair svela un revival di quattro episodi che debutterà il 10 aprile 2026 su Hulu e Disney+. 
    Malcolm, che per oltre un decennio ha cercato di proteggere se stesso e sua figlia dall'influenza dei suoi parenti, viene trascinato nuovamente nel loro orbita quando Hal e Lois decidono di festeggiare il loro 40° anniversario nello stesso parco roulotte dove Malcolm sta cercando di godersi una vacanza tranquilla.
  links:
  - "https://youtu.be/ABol0H2n_rc?si=3YuSyiIOFVS7prSz"

- id: 2
  title: "Cordura: l'horror psicologico dove le ombre imitano la tua squadra"
  description: |
    Presentato ieri al Future Games Show Spring Showcase 2026, Cordura è il nuovo horror psicologico cooperativo (fino a 4 giocatori) sviluppato dallo studio indipendente Garage51. 
    Ambientato in labirinti vittoriani procedurali che cambiano in tempo reale, 
    il gioco mette alla prova la sanità mentale dei giocatori, trasformando la paranoia nello strumento di caccia principale dei mostri. Il motto è semplice: "Entra, prendi, esci"

  links:
  - "https://youtu.be/66JlZVyE9DY?si=l-FZajekNAjW-Cx0"

- id: 3
  title: "Kpop Demon Hunters 2 è ufficiale"
  description: |
    Dopo aver conquistato il titolo di film più visto di sempre sulla piattaforma, Kpop Demon Hunters tornerà con un seguito ufficiale. 
    Netflix ha rotto gli indugi la scorsa notte, confermando che il nuovo capitolo è già in fase di produzione. 
    Nonostante le speculazioni su un possibile prequel, la comunicazione ufficiale parla chiaramente di un sequel che manterrà la continuità narrativa.
  links:
  - "https://multiplayer.it/notizie/kpop-demon-hunters-2-e-ufficiale-arriva-lannuncio-di-netflix-sul-seguito-del-film.html"
