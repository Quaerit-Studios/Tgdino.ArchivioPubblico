- id: 1
  title: "Hideki Kamiya chiede una \"Modalità non spaventosa\" per Resident Evil Requiem"
  description: |
    Con il suo solito stile provocatorio e diretto, Hideki Kamiya (padre di Bayonetta e Devil May Cry) ha lanciato un appello a Capcom tramite i suoi canali social, suggerendo l'introduzione di una "Non-Scary Mode" per Resident Evil Requiem. 
    Nonostante Mikami sia un veterano del genere, ha ammesso scherzosamente che l'ultima fatica di Nakanishi è "troppo intensa" anche per lui, proponendo una modalità che riduca i jump scare o modifichi l'illuminazione per rendere l'esperienza meno traumatica per chi soffre di ansia.
  links:
  - "https://www.instagram.com/p/DVv7QRijDZl"

- id: 2
  title: "Laptop nel 2026 - Rincari fino al 40% tra crisi delle memorie e costi CPU"
  description: |
    L'acquisto di un nuovo notebook sta diventando un investimento proibitivo. 
    Secondo l'ultima analisi di TrendForce del 10 marzo 2026, i prezzi dei laptop "mainstream" (quelli che costavano circa 900$ all'inizio del 2025) potrebbero subire un’impennata del 40%, superando i 1.250€ entro la fine dell'anno. 
    Questo fenomeno non è dovuto solo alla carenza di memorie, ma a un "mix micidiale" di rincari che colpisce ogni componente chiave del sistema.
  links:
  - "https://multiplayer.it/notizie/prezzi-laptop-aumentando-previsioni.html"

- id: 3
  title: "Rick e Morty Stagione 9: debutto fissato per il 24 maggio"
  description: |
    La serie, che dal 2021 ha adottato un ritmo di produzione serrato di una stagione all'anno, verrà distribuita globalmente in 170 paesi. 
    Il presidente di Adult Swim, Michael Ouweleen, ha promesso episodi caratterizzati da una "fantastica follia" e una scrittura dei personaggi di alto livello
  links:
