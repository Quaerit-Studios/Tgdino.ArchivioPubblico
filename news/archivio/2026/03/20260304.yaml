- id: 1
  title: "Prime Video trova le sue Max e Chloe per la serie di Life is Strange"
  description: |
    La debuttante televisiva Tatum Grace Hopkins interpreterà Max Caulfield, mentre Maisy Stella (Nashville, My Old Ass) vestirà i panni di Chloe Price. 
    La serie, affidata alla showrunner Charlie Covell (The End of the F*ing World), seguirà fedelmente la trama del primo gioco del 2015, esplorando il mistero della sparizione di Rachel Amber ad Arcadia Bay e il potere di Max di riavvolgere il tempo.
  links:
  - "https://www.instagram.com/p/DVb3Of_D_z1"

- id: 2
  title: "Resident Evil Requiem vende 5 milioni di copie in soli 5 giorni"
  description: |
    Il titolo è diventato il capitolo della saga con la crescita più rapida di sempre, polverizzando i record di Village e del remake di RE4. 
    Il successo è stato trainato dall'accoglienza entusiasta di critica e pubblico, oltre che dal ritorno dell'iconico Leon S. Kennedy e della nuova protagonista Grace Ashcroft proprio nel mese del 30° anniversario del franchise.
  links:
  - "https://www.instagram.com/p/DVdeOJzlEbE"

- id: 3
  title: "Paramount acquisisce Warner Bros: tagli da 16 miliardi e rischi per il gaming"
  description: |
    L'amministratore delegato di Netflix, Ted Sarandos, ha rivelato che l'acquisizione di Warner Bros. 
    Discovery da parte di Paramount Skydance (per 110 miliardi di dollari) comporterà tagli ai costi superiori ai 16 miliardi in 18 mesi. 
    A forte rischio è la divisione WB Games (Rocksteady, Avalanche), giudicata "debole" dopo i recenti flop e quasi ignorata nelle presentazioni agli investitori di Paramount.
  links:
  - "https://multiplayer.it/notizie/paramount-tagliera-16-miliardi-di-costi-dopo-lacquisizione-di-warner-bros-a-rischio-anche-la-divisione-videogiochi.html"
