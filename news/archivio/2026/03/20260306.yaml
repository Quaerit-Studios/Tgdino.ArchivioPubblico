- id: 1
  title: "Project Helix - La nuova Xbox eseguirà nativamente i giochi PC"
  description: |
    La CEO di Microsoft Gaming, Asha Sharma, ha ufficialmente annunciato Project Helix, il nome in codice della console Xbox di prossima generazione. 
    Sarà una macchina ibrida capace di far girare nativamente sia i titoli Xbox che l'intera libreria PC (inclusi store come Steam ed Epic Games Store). 
    L'obiettivo dichiarato è "riportare Xbox al centro" con una piattaforma aperta che punta a prestazioni leader del settore, posizionandosi come l'anello di congiunzione tra il mondo console e quello computer.
  links:
  - "https://www.instagram.com/p/DVhCPINFB7r"

- id: 2
  title: "The Pokémon Company contro la Casa Bianca: \"Nessun permesso per lo slogan MAGA\""
  description: |
    The Pokémon Company ha rilasciato una duratura dichiarazione ufficiale per dissociarsi dall'ultimo post social della Casa Bianca, 
    che utilizzava immagini generate dall'IA nello stile di Pokémon Pokopia per promuovere il movimento MAGA. 
    L'azienda giapponese ha ribadito di non aver concesso alcuna autorizzazione all'uso della propria proprietà intellettuale, sottolineando che la missione del brand è unire le persone e non sostenere agende politiche.
  links:
  - "https://multiplayer.it/notizie/pokemon-pokopia-usato-dalla-casa-bianca-per-uno-slogan-maga-the-pokemon-company-interviene.html"

- id: 3
  title: "Sospeso il dominio di 5channel"
  description: |
    Il registrar Epik ha sospeso permanentemente il dominio storico di 5channel (5ch.net), 
    la bacheca giapponese che ha ispirato la nascita di 4chan e di tutta la cultura dei meme. 
    La decisione è arrivata dopo gravi violazioni dei termini di servizio legate alla diffusione di contenuti illegali e alla mancanza di moderazione. 
    Sebbene il sito sia ora attivo su un dominio secondario, la chiusura segna il tramonto di un'epoca in cui l'anonimato totale permetteva sia la massima creatività che la proliferazione di odio e tossicità online.
  links:
  - "https://multiplayer.it/notizie/5channel-la-board-che-ha-ispirato-4chan-e-stata-sospesa.html"
