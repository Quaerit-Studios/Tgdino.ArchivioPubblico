- id: 1
  title: "Addio a Chuck Norris - La leggenda dell'action si spegne a 86 anni"
  description: |
    Il mondo del cinema piange la scomparsa di Chuck Norris, indimenticabile volto di Walker Texas Ranger venuto a mancare all'età di 86 anni. 
    Dalle battaglie in pellicole cult come Delta Force e I Mercenari fino al fenomeno dei meme su Internet, l'attore e maestro di arti marziali lascia un'eredità nella cultura pop di intere generazioni.
  links:
  - "https://www.instagram.com/p/DWG_hvxjiPk"

- id: 2
  title: "Crollo in borsa per Pearl Abyss: colpa del Metascore di Crimson Desert"
  description: |
    Pearl Abyss ha visto le proprie azioni precipitare di quasi il 30% in seguito all'accoglienza riservata a Crimson Desert. 
    Il titolo ha debuttato con un Metascore di 78, un punteggio considerato deludente dagli investitori date le enormi aspettative, anche se la media finale è destinata a fluttuare con l'arrivo delle prossime recensioni.
  links:
  - "https://www.instagram.com/p/DWEGJTdla2e"

- id: 3
  title: "Assassin's Creed di Netflix sarà ambientato nell'Antica Roma"
  description: |
    La serie live-action dedicata al franchise di Ubisoft prenderà ufficialmente il via nel 64 d.C., proiettando gli spettatori nel cuore dell'Antica Roma. 
    L'anno del devastante Grande Incendio sotto l'imperatore Nerone farà da sfondo alle vicende inedite della Confraternita. Un'ambientazione di intrighi storici e politici che promette di espandere l'universo narrativo.
  links:
  - "https://www.instagram.com/p/DWGxznADioq"
