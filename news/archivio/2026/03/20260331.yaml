- id: 1
  title: "Kit Ellis afferma che l'azienda dev'essere \"furiosa\" per i leak su Zelda e Mario"
  description: |
    L'ex dipendente di Nintendo (noto volto del defunto show "Nintendo Minute" e ora podcaster), ha commentato con toni decisi i recenti leak diffusi dall’insider NateTheHate. Secondo Ellis, i vertici di Kyoto devono essere su tutte le furie per la fuga di notizie riguardante due dei progetti più attesi e segreti dell'azienda: 
    un presunto remake di The Legend of Zelda Ocarina of Time e un nuovisso capitolo in 3D di Super Mario.
  links:
  - "https://www.instagram.com/p/DWhR0oTFB3n/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Masters of the Universe - Svelato il trailer del live-action su He-Man"
  description: |
    Amazon MGM Studios ha rilasciato il primo vero trailer ufficiale dell'atteso film in live-action Masters of the Universe, pronto a riportare sul grande schermo il leggendario franchise di giocattoli e animazione degli anni '80. 
    La pellicola farà il suo debutto esclusivo nelle sale cinematografiche a partire dal 5 giugno 2026.
  links:
  - "https://youtu.be/X21JsHLHnY8?si=H1_XFMYTv3X0sZOo"

- id: 3
  title: "Rec Room al capolinea - Fallimento economico e chiusura ufficiale dei server"
  description: |
    Nonostante l'enorme base di utenti e la popolarità raggiunta negli anni, Rec Room ha ufficialmente dichiarato il fallimento economico. Il team di sviluppo ha annunciato che i costi di gestione hanno irrimediabilmente superato gli introiti, 
    portando alla drastica decisione di chiudere definitivamente l'intera piattaforma.
  links:
  - "https://multiplayer.it/notizie/rec-room-fallisce-economicamente-e-chiude-annunciata-la-data-di-disattivazione.html"
