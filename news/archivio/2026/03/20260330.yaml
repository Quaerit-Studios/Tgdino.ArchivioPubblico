- id: 1
  title: "Crimson Desert - Il CEO di Pearl Abyss ammette che la storia \"poteva essere migliore\""
  description: |
    Nonostante il successo di vendite, le critiche mosse alla narrativa del gioco non sono affatto passate inosservate, tanto da spingere i vertici dello studio sudcoreano a una sincera ammissione di colpa. Durante una recente assemblea degli azionisti, 
    il CEO Heo Jin-young ha affrontato direttamente le lamentele dei giocatori riguardo alla piattezza della trama e alla debolezza dei personaggi, dando di fatto ragione alla community.
  links:
  - "https://www.instagram.com/p/DWZqTisCfH8/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Resident Evil Requiem - L'esperto di lore TheBatman critica il \"retcon\" su Raccoon City"
  description: |
    Il content creator e “maestro della lore" del franchise, noto nella community come TheBatman, è intervenuto duramente sulla controversa direzione narrativa intrapresa nel nuovo Resident Evil: Requiem. 
    Al centro delle polemiche c'è una clamorosa riscrittura di uno degli eventi più intoccabili e drammatici dell'intera saga: la distruzione di Raccoon City vista nel finale di Resident Evil 3.
  links:
  - "https://www.instagram.com/p/DWZxK72lE3v/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "Addio a James Tolkan - Il Preside Strickland di \"Ritorno al Futuro\" si spegne a 94 anni"
  description: |
    Il mondo del cinema saluta James Tolkan, che è morto serenamente all'età di 94 anni nella sua casa di Saranac Lake, nello stato di New York. Con il suo volto inconfondibile e la sua attitudine, l'attore ha lasciato un'impronta indelebile nella cultura pop, 
    interpretando figure autoritarie che sono entrate di diritto nella storia del cinema degli anni '80 e '90.
  links:
  - "https://www.instagram.com/p/DWdF6kUgKUT/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="
