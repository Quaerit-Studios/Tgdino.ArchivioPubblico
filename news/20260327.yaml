- id: 1
  title: "The End of Oak Street - Anne Hathaway ed Ewan McGregor nel nuovo fanta-thriller"
  description: |
    Warner Bros. ha appena rilasciato il primo teaser trailer di The End of Oak Street, l'enigmatico film sci-fi precedentemente noto con il titolo di lavorazione Flowervale Street. Scritta e diretta da David Robert Mitchell (il creatore dell'horror cult It Follows) e prodotta dalla Bad Robot di J.J. 
    Abrams, la pellicola promette di mescolare il dramma di sopravvivenza con le atmosfere della grande fantascienza.
  links:
  - "https://youtu.be/s9GKXTbChjE?si=AbOSzzgcgQdKc4Ig"

- id: 2
  title: "Pokémon verso quota 10mila?"
  description: |
    Il Pokédex continua la sua crescita: attualmente il franchise conta ben 1.025 creature ufficiali, ma le speculazioni già corrono al rialzo ipotizzando che un giorno questo numero potrebbe addirittura arrivare a sfiorare la cifra di 10mila. 
    Ad arricchire questa schiera ci penseranno a breve i nuovi starter di decima generazione, da poco presentati.
  links:
  - "https://www.instagram.com/p/DWW-iH-lGoN/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "Netflix aumenta i prezzi negli Stati Uniti - Rincari in arrivo anche in Italia?"
  description: |
    Secondo le anticipazioni lanciate dalla testata Variety, la piattaforma di streaming aumenterà i prezzi mensili di tutti i suoi piani, con rincari compresi tra uno e due dollari. Sebbene al momento la manovra riguardi esclusivamente il mercato americano, 
    le politiche passate dell'azienda suggeriscono che questo adeguamento potrebbe presto estendersi anche all'Europa e all'Italia.
  links:
  - "https://multiplayer.it/notizie/netflix-sta-per-aumentare-i-prezzi-dei-piani-di-abbonamento-in-usa-e-in-italia.html"
