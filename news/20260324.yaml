- id: 2
  title: "The Boys 5 - Niente grandi battaglie nel gran finale, Kripke incolpa il budget"
  description: |
    La quinta e ultima stagione di The Boys cambierà marcia rispetto agli standard a cui la serie ci ha abituato. 
    Il creatore e showrunner Eric Kripke ha infatti smorzato gli entusiasmi dei fan in cerca di epicità su larga scala, avvertendo che il capitolo conclusivo dovrà fare i conti con precise restrizioni economiche imposte dalla produzione.
  links:
  - "https://www.instagram.com/p/DWRZlovFY5G"

- id: 3
  title: "Epic Games annuncia oltre 1.000 licenziamenti: la crisi colpisce anche il gigante di Fortnite"
  description: |
    In una nota interna e trasparente inviata al personale, il CEO Tim Sweeney ha spiegato le ragioni dietro a questa drastica manovra, 
    confermando le indiscrezioni che circolavano nelle ultime ore e certificando un momento di forte contrazione per l'intera industria videoludica.
  links:
  - "https://www.instagram.com/p/DWRgdScl_l4"
