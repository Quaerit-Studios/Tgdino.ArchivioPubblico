- id: 1
  title: "The Boys - Lo showrunner Eric Kripke ansioso per l'ultima stagione, \"I fan giudicheranno l'intero show dal finale\""
  description: |
    Lo showrunner di The Boys, Eric Kripke, ha confessato di provare una forte ansia in vista del debutto dell'ultima stagione della serie televisiva. Il timore principale dell'autore è che la conclusione dell'opera 
    possa influenzare pesantemente e in modo definitivo la percezione che il pubblico ha dell'intero franchise.
  links:
  - "https://www.instagram.com/p/DW4IZUsjaUt/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 2
  title: "Spider Man: Brand New Day - Tom Holland ancora sul set per \"la ciliegina sulla torta\""
  description: |
    Nonostante manchino pochi mesi all'uscita ufficiale del film, i lavori sul prossimo capitolo cinematografico dell'Uomo Ragno non sono ancora del tutto conclusi. Tom Holland ha infatti confermato di essere attualmente impegnato sul set di Spider-Man: 
    Brand New Day per girare alcune sequenze aggiuntive dell'ultimo minuto.
  links:
  - "https://www.instagram.com/p/DW36pMYDNjJ/?utm_source=ig_web_copy_link&igsh=MzRlODBiNWFlZA=="

- id: 3
  title: "Crisi delle RAM: prezzi alle stelle fino al 2028 a causa del boom dell'Intelligenza Artificiale"
  description: |
    La corsa allo sviluppo dell'intelligenza artificiale sta per colpire duramente il portafoglio dei consumatori. Secondo le recenti dichiarazioni di Michael Dell, CEO di Dell Technologies, il mercato delle memorie RAM affronterà una crisi di disponibilità senza precedenti, 
    destinata a far schizzare i prezzi verso l'alto in modo inesorabile almeno fino al 2028.
  links:
  - "https://multiplayer.it/notizie/la-crisi-delle-ram-raggiungera-livelli-mai-visti-entro-il-2028-e-i-consumatori-non-avranno-scelta-pagheranno.html"
