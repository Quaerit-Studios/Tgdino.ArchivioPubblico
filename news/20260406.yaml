- id: 2
  title: "Elden Ring - Un leak svela il set dell'adattamento?"
  description: |
    Un fan di Elden Ring ha appena riacceso le speranze della community, condividendo online quello che sembra essere il primissimo sguardo al set dell'atteso adattamento live-action del capolavoro targato FromSoftware. 
    La foto ha immediatamente fatto il giro del web, scatenando l'entusiasmo dei fan da tutto il mondo.
