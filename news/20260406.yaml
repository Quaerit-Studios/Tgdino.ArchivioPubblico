  title: "Red Dead Redemption 3 - Jack Black si candida per interpretare un fuorilegge...di nome Jack Black"
  description: |
    L'attore e musicista ha le idee molto chiare sul suo futuro nel mondo dei videogiochi. Dopo aver prestato la voce a Bowser nel film di Super Mario e aver partecipato all'adattamento cinematografico di Minecraft, 
    ha svelato chi vorrebbe interpretare in un ipotetico Red Dead Redemption 3 targato Rockstar Games.
