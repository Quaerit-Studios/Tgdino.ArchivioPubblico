- id: 3
  title: "Super Mario Galaxy - Un debutto globale da 372,5 milioni di dollari"
  description: |
    Il sequel animato targato Nintendo e Illumination vola altissimo al botteghino. Super Mario Galaxy - Il Film ha registrato un lancio internazionale, totalizzando ben 372,5 milioni di dollari. 
    Si tratta di una performance che ricalca quasi perfettamente il debutto del primo Super Mario Bros. - Il Film, che si era fermato a quota 375 milioni.
  links:
  - "https://multiplayer.it/notizie/super-mario-galaxy-il-film-ha-incassato-3725-milioni-di-dollari-al-lancio.html"
